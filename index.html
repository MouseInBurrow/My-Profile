            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            cursor: url('cursor.cur'), pointer;
        }
        a, button, .pointer {
        cursor: url('cursor.cur'), pointer;
        }
        
        .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #0d0d0e;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 24px;
        cursor: url(yt.png);
        z-index: 1000;
        font-family: 'Arial', sans-serif;
        font-weight: bold;
        opacity: 0.9; 
        filter: blur(1.5px);
        }
        
        
        .profile-container {
            text-align: center;
            color: #fff;
        }
        
        .profile-picture {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 8px solid #1f202038;
        }
        
        .username {
            position: relative;
            font-family: 'Arial black', sans-serif;
            font-weight: bold;
            margin-top: 10px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
        }
        .description {
            position: relative;
            font-family: 'Arial black', sans-serif;
            margin-top: 10px;
            font-weight: bold;
            font-size: 10px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
        }
        
        .sparkles {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 30px;
            pointer-events: none;
            filter: brightness(0.7) invert(1);
            z-index: 1;
        }
        
        .button {
        width: 40px;
        height: 40px;
        margin: 0 5px;
        background-color: #31333338;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        }
        
        .button-tooltip {
        display: none; /* Временно скрываем тултипы */
        }
        
        .button:hover .button-tooltip {
            opacity: 1;
        }
        
        .button:hover {
            transform: scale(1.1);
            /* Make the button slightly bigger on hover */
        }
        
        .button img {
        width: 30%;  /* Уменьшил с 80% до фиксированного размера */
        height: 30%;
        display: block; /* Убирает возможные отступы */
        }

        position: fixed; /* Фиксированное позиционирование относительно окна браузера */

        margin: 0;
        padding: 0;
        pointer-events: none; /* Текст не будет перехватывать клики */

        margin: 0;

                }, 5000); // ms
